services:
  # PostgreSQL Database (standard PostgreSQL with extensions)
  postgres:
    image: postgres:16
    container_name: decorativeplant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-DecorativePlantDB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decorativeplant-network

  # Redis Cache (for refresh tokens)
  redis:
    image: redis:7-alpine
    container_name: decorativeplant-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decorativeplant-network

  # pgAdmin (PostgreSQL Web Administration)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: decorativeplant-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@decorativeplant.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      # Server mode + master password required (see https://www.pgadmin.org/docs/pgadmin4/latest/container_deployment.html )
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - decorativeplant-network

  # API Application
  api:
    build:
      context: .
      dockerfile: decorativeplant-be.API/Dockerfile
    container_name: decorativeplant-api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
      - APP_UID=${APP_UID:-1654}
      - APP_GID=${APP_GID:-1654}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-DecorativePlantDB};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - ConnectionStrings__Redis=${ConnectionStrings__Redis:-redis:6379}
      - Database__ApplyMigrationsOnStartup=${Database__ApplyMigrationsOnStartup:-false}
      - JwtSettings__SecretKey=${JwtSettings__SecretKey:-}
      - JwtSettings__Issuer=${JwtSettings__Issuer:-DecorativePlantAPI}
      - JwtSettings__Audience=${JwtSettings__Audience:-DecorativePlantClient}
      - JwtSettings__AccessTokenExpirationMinutes=${JwtSettings__AccessTokenExpirationMinutes:-30}
      - JwtSettings__RefreshTokenExpirationDays=${JwtSettings__RefreshTokenExpirationDays:-7}
      - EmailSettings__SmtpHost=${EmailSettings__SmtpHost:-smtp.gmail.com}
      - EmailSettings__SmtpPort=${EmailSettings__SmtpPort:-587}
      - EmailSettings__UseSsl=${EmailSettings__UseSsl:-true}
      - EmailSettings__SmtpUser=${EmailSettings__SmtpUser:-}
      - EmailSettings__SmtpPassword=${EmailSettings__SmtpPassword:-}
      - EmailSettings__FromAddress=${EmailSettings__FromAddress:-noreply@decorativeplant.com}
      - EmailSettings__FromName=${EmailSettings__FromName:-Decorative Plant}
      - EmailSettings__DisableSending=${EmailSettings__DisableSending:-true}
      - OtpSettings__Secret=${OtpSettings__Secret:-}
      - OtpSettings__RegistrationExpiresMinutes=${OtpSettings__RegistrationExpiresMinutes:-10}
      - OtpSettings__PasswordResetExpiresMinutes=${OtpSettings__PasswordResetExpiresMinutes:-15}
      - PayOS__ClientId=${PayOS__ClientId:-}
      - PayOS__ApiKey=${PayOS__ApiKey:-}
      - PayOS__ChecksumKey=${PayOS__ChecksumKey:-}
      - AiDiagnosis__Provider=${AiDiagnosis__Provider:-OpenAI}
      - AiDiagnosis__ApiKey=${AiDiagnosis__ApiKey:-}
      - AiDiagnosis__Model=${AiDiagnosis__Model:-gpt-4o}
      - AiDiagnosis__MaxTokens=${AiDiagnosis__MaxTokens:-1024}
      - AiDiagnosis__GeminiApiKey=${AiDiagnosis__GeminiApiKey:-}
      - AiDiagnosis__GeminiModel=${AiDiagnosis__GeminiModel:-gemini-2.5-flash}
      - AiDiagnosis__GeminiBaseUrl=${AiDiagnosis__GeminiBaseUrl:-https://generativelanguage.googleapis.com}
      - GhnSettings__BaseUrl=${GhnSettings__BaseUrl:-https://dev-online-gateway.ghn.vn}
      - GhnSettings__Token=${GhnSettings__Token:-}
      - GhnSettings__ShopId=${GhnSettings__ShopId:-0}
      # S3 — must be listed here or Compose never forwards Infisical/host env into the container
      - S3__Region=${S3__Region:-}
      - S3__Bucket=${S3__Bucket:-}
      - S3__AccessKeyId=${S3__AccessKeyId:-}
      - S3__SecretAccessKey=${S3__SecretAccessKey:-}
      - S3__PublicBaseUrl=${S3__PublicBaseUrl:-}
      - S3__UsePresignedUrl=${S3__UsePresignedUrl:-false}
      - S3__PresignedUrlExpiresMinutes=${S3__PresignedUrlExpiresMinutes:-60}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      # Google OAuth — must be listed here or Compose never forwards Infisical/host env into the container
      - GOOGLE__ClientId=${GOOGLE__ClientId:-}
      - GOOGLE__ClientSecret=${GOOGLE__ClientSecret:-}
      - GOOGLE__BaseUrl=${GOOGLE__BaseUrl:-http://localhost:8080/api}
      - FRONTEND__BaseUrl=${FRONTEND__BaseUrl:-http://localhost:5173}
      #Ollama
      - Ollama__BaseUrl=${Ollama__BaseUrl:-http://host.docker.internal:11434}
      - Ollama__Model=${Ollama__Model:-llama3.1:8b}
      - Ollama__TimeoutSeconds=${Ollama__TimeoutSeconds:-60}
      # Optional: JSON intent routing for image+caption (empty = keyword-only). May match Ollama__Model e.g. llama3.1:8b.
      - Ollama__IntentClassificationModel=${Ollama__IntentClassificationModel:-}
      - Ollama__IntentClassificationTimeoutSeconds=${Ollama__IntentClassificationTimeoutSeconds:-12}
      - AiCare__CacheTtlHours=${AiCare__CacheTtlHours:-24}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - decorativeplant-network
    volumes:
      - ./logs:/app/logs
      # Persist Data Protection keys so they survive container restarts (removes the key-persistence warning)
      - dataprotection_keys:/home/app/.aspnet/DataProtection-Keys

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  dataprotection_keys:

networks:
  decorativeplant-network:
    driver: bridge
